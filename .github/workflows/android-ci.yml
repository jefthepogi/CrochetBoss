name: CrochetBoss Jetpack Compose Android CI

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-sign:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - name: Checkout Code
      uses: actions/checkout@v6

    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        distribution: 'zulu'
        java-version: '17'
        cache: 'gradle'

    - name: Grant Execute Permission to Gradle
      run: chmod +x ./gradlew

    # Run simple unit tests to ensure stability
    - name: Run Unit Tests
      run: ./gradlew testDebugUnitTest

    # Conditional Execution: Build regular Debug APK for branches / PRs
    - name: Build Debug APK
      if: github.ref != 'refs/heads/main'
      run: ./gradlew app:assembleDebug

    # Secure Step: Decode the production keystore ONLY for the main branch release
    - name: Decode Production Keystore
      if: github.ref == 'refs/heads/main'
      env:
        ENCODED_KEYSTORE: ${{ secrets.KEYSTORE_BASE64 }}
      run: |
        mkdir -p app/keystore
        echo "$ENCODED_KEYSTORE" | base64 --decode > app/keystore/release.jks

    # Secure Step: Compile and sign Release APK ONLY on the main branch
    - name: Build and Sign Production Release APK
      if: github.ref == 'refs/heads/main'
      env:
        SIGNING_STORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
        SIGNING_KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
        SIGNING_KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: ./gradlew app:assembleRelease

    # Secure Step: Wipe the decoded keystore binary file immediately after compilation
    - name: Post-Build Keystore Cleanup
      if: always()
      run: rm -rf app/keystore/

    # Upload Artifacts: Dynamically save whichever APK version was built
    - name: Upload Output APK Artifact
      uses: actions/upload-artifact@v7
      with:
        name: Jetpack-Compose-APKs
        path: |
          app/build/outputs/apk/debug/*.apk
          app/build/outputs/apk/release/*.apk
        retention-days: 5
